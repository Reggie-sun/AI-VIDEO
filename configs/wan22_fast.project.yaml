project_name: wan22-fast-demo
comfy:
  base_url: http://127.0.0.1:8188
workflow:
  template: ../workflows/templates/wan22_i2v_api.json
  binding: ../workflows/bindings/wan22_i2v_binding.yaml
output:
  root: ../runs
  min_free_gb: 0
defaults:
  width: 1024
  height: 576
  fps: 20
  clip_seconds: 3
  seed: 100
  negative_prompt: Bright tones, overexposed, static, blurred details, subtitles,
    worst quality, low quality, JPEG compression residue, ugly, deformed, disfigured,
    misshapen limbs, fused fingers, still picture, face morphing, outfit changing,
    body shape changing, inconsistent appearance
  style_prompt: cinematic, consistent character appearance, stable outfit throughout,
    natural motion, coherent lighting, professional color grading, no morphing
  max_attempts: 1
  poll_interval_seconds: 2
  job_timeout_seconds: 900
characters: []
